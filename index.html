<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Formula 1 TV</title>

<script src="https://stats.f1live.dpdns.org/counts?viewerId=d76a2686-0227-4bcb-8096-2eae3280c187&channelId=243335"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    background:#000;
    overflow:hidden;
}

#player{
    width:100vw;
    height:100vh;
    background:#000;
}

.status{
    position:fixed;
    top:15px;
    left:50%;
    transform:translateX(-50%);

    display:flex;
    align-items:center;
    gap:8px;

    background:rgba(0,0,0,.7);
    backdrop-filter:blur(8px);

    color:white;

    padding:8px 14px;

    border-radius:999px;

    font-family:Arial,sans-serif;
    font-size:14px;

    z-index:9999;
}

.dot{
    width:10px;
    height:10px;
    border-radius:50%;
}

.online{
    background:#00ff55;
    box-shadow:0 0 10px #00ff55;
}

.buffering{
    background:#ffd500;
    box-shadow:0 0 10px #ffd500;
}

.offline{
    background:#ff3333;
    box-shadow:0 0 10px #ff3333;
}

</style>
</head>
<body>

<div class="status">
    <div class="dot buffering" id="dot"></div>
    <span id="status">Carregando...</span>
</div>

<video
    id="player"
    controls
    autoplay
    playsinline>
</video>

<script>

const STREAM_URL =
"https://hakunamatata5.org:8088/hls/sky-f1.m3u8";

const video = document.getElementById("player");
const statusText = document.getElementById("status");
const dot = document.getElementById("dot");

function setStatus(type,text){

    dot.className = "dot " + type;
    statusText.textContent = text;

}

video.addEventListener("playing", () => {
    setStatus("online","Online");
});

video.addEventListener("waiting", () => {
    setStatus("buffering","Buffering");
});

video.addEventListener("stalled", () => {
    setStatus("buffering","Buffering");
});

video.addEventListener("seeking", () => {
    setStatus("buffering","Buffering");
});

video.addEventListener("error", () => {
    setStatus("offline","Offline");
});

if (Hls.isSupported()) {

    const hls = new Hls({
        enableWorker:true,
        lowLatencyMode:true
    });

    hls.loadSource(STREAM_URL);
    hls.attachMedia(video);

    hls.on(Hls.Events.MANIFEST_PARSED, () => {

        setStatus("buffering","Conectando...");

        video.play().catch(() => {});

    });

    hls.on(Hls.Events.ERROR, (event,data) => {

        if(data.fatal){

            setStatus("offline","Offline");

            console.error(data);

        }

    });

} else if (
    video.canPlayType("application/vnd.apple.mpegurl")
) {

    video.src = STREAM_URL;

    video.addEventListener("loadedmetadata", () => {

        video.play().catch(() => {});

    });

} else {

    setStatus(
        "offline",
        "Sem suporte HLS"
    );

}

</script>

</body>
</html>
