<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Formula 1 TV</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    background:#000;
    overflow:hidden;
}

#player{
    width:100vw;
    height:100vh;
    background:#000;
}

.status{
    position:fixed;
    top:10px;
    left:10px;
    background:rgba(0,0,0,.7);
    color:white;
    padding:8px 12px;
    border-radius:6px;
    font-family:Arial,sans-serif;
    z-index:9999;
}
</style>
</head>
<body>

<div class="status" id="status">
    Carregando...
</div>

<video
    id="player"
    controls
    autoplay
    playsinline>
</video>

<script>

// ==============================
// COLE SUA URL .M3U8 AQUI
// ==============================
const STREAM_URL = "https://hakunamatata5.org:8088/hls/sky-f1.m3u8";

// ==============================

const video = document.getElementById("player");
const statusBox = document.getElementById("status");

if (Hls.isSupported()) {

    const hls = new Hls({
        enableWorker: true,
        lowLatencyMode: true
    });

    hls.loadSource(STREAM_URL);
    hls.attachMedia(video);

    hls.on(Hls.Events.MANIFEST_PARSED, () => {
        statusBox.innerText = "Online";
        video.play().catch(() => {});
    });

    hls.off(Hls.Events.ERROR, (event, data) => {
        statusBox.innerText = "Erro ao carregar stream";
        console.error(data);
    });

} else if (
    video.canPlayType("application/vnd.apple.mpegurl")
) {

    video.src = STREAM_URL;

    video.addEventListener("loadedmetadata", () => {
        statusBox.innerText = "Online";
        video.play().catch(() => {});
    });

} else {

    statusBox.innerText =
        "Seu navegador não suporta HLS";

}
</script>

</body>
</html>
